---
layout: default
---

<div class="note-shell">
  <div class="note-top">
    <a class="back-link" href="{{ site.baseurl }}/notes/">← Back to Notes</a>
    <span class="note-chip">Cybersecurity Note</span>
  </div>

  <header class="note-header">
    <h1>{{ page.title }}</h1>
    {% if page.description %}
      <p class="note-desc">{{ page.description }}</p>
    {% endif %}
  </header>

  <article class="note-body">
    {{ content }}
  </article>
</div>
